---
- name: Deploy sdkgf44
  hosts: all
  become: true
  gather_facts: yes
  # Retry SSH connections — EC2 instances sometimes drop the connection under load
  # during the first heavy task (apt-get update) right after boot.
  vars:
    ansible_ssh_retries: 5
    app_dir: /opt/app
    app_port: 8080
    project: 'sdkgf44'
    web_server: 'nginx'
    java_version: '21'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Wait for SSH to be fully ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _apt_update
      until: _apt_update is succeeded

    # ── Java runtime ──────────────────────────────────────────────────────────
    - name: Install Java {{ java_version }}
      apt:
        name: "openjdk-{{ java_version }}-jre-headless"
        state: present

    # ── Web server (nginx / apache / none) ────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Find uploaded JAR
      find:
        paths:
          - "{{ app_dir }}/target"
          - "{{ app_dir }}/build/libs"
        patterns: "*.jar"
        recurse: no
      register: jar_search

    - name: Fail if no JAR found
      fail:
        msg: "No JAR file found in target/ or build/libs/"
      when: jar_search.files | length == 0

    - name: Set app_jar fact
      set_fact:
        app_jar: "{{ jar_search.files | sort(attribute='mtime') | last | json_query('path') }}"

    - name: Create systemd service for Spring Boot
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} Spring Boot app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/java -jar {{ app_jar }} --server.port={{ app_port }}
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for Spring Boot to start
      wait_for:
        port: 8080
        host: 127.0.0.1
        timeout: 300
        delay: 20
      ignore_errors: yes
      register: port_wait

    - name: Show Spring Boot logs if startup failed
      command: journalctl -u app -n 80 --no-pager
      register: service_logs
      when: port_wait is failed
      changed_when: false

    - name: Fail with logs if Spring Boot did not start
      fail:
        msg: "{{ service_logs.stdout }}"
      when: port_wait is failed

    - name: Reload and start web server
      service:
        name: "{{ web_server if web_server not in ('none', 'skip', 'no', '') else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted
